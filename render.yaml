# Render Blueprint — deploys the backend as a single free Docker web service.
# In Render: New ➜ Blueprint, connect this repo, and it reads this file.
# The frontend is NOT deployed here (it goes to Vercel — see DEPLOYMENT.md).
services:
  - type: web
    name: ck3-history-generator-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Where result ZIPs are written (ephemeral on the free plan — fine, since
      # the generate ➜ download flow happens within seconds).
      - key: RESULTS_DIR
        value: /tmp/results
      - key: GENERATION_WORKERS
        value: "4"
      - key: JOB_TTL_SECONDS
        value: "3600"
      # Lock this to your real frontend origin once it's live, e.g.
      #   https://yourdomain.com
      # Leave as * until then. (Render injects PORT automatically.)
      - key: CORS_ORIGINS
        value: "*"
