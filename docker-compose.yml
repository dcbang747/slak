services:
  api:
    build: ./backend
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_PROXY: http://api:8000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_POLL_INTERVAL: "300"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - api
